<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>

    <link rel="icon" type="image/png" href="ARROW.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;

            background-image: url("manilamap.png");
            background-size: cover;
            background-position: center;

            /* 🔥 THIS CENTERS EVERYTHING */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            border-radius: 16px;
            width: 400px;
            padding: 40px;
            border: 4px solid #cbd0d8;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.6);
            background: rgba(39, 115, 165, 0.08);
            backdrop-filter: blur(8px);
        }

        .btn-custom {
            background: #ffffff;
            color: #33456b;
            font-weight: 600;
            border: none;
        }

        .btn-custom:hover {
            background: #d9d9d9;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box text-center">

    <h2 class="mb-3">FareRides Login</h2>

    <!-- CHECKBOX -->
    <div class="form-check mb-3 text-start">
        <input class="form-check-input" type="checkbox" id="checkboxID" onclick="toggleInstructions()">
        <label class="form-check-label">
            Show Instructions
        </label>
    </div>

    <p id="message" class="text-muted text-start"></p>

    <!-- LOGIN -->
    <input type="text" id="username" class="form-control mb-2" placeholder="Username">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-custom w-100" onclick="login()">Login</button>

    <h4 id="result"></h4>

</div>

<script>

// LOGIN (if-else with === and &&)
function login() {

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let correctUser = "admin";
    let correctPass = "1234";

    if (username === correctUser && password === correctPass) {
        document.getElementById("result").innerHTML = "✅ Access Granted";
        document.getElementById("result").style.color = "lightgreen";
    } else {
        document.getElementById("result").innerHTML = "❌ Access Denied";
        document.getElementById("result").style.color = "red";
    }
}

// SWITCH (checkbox)
function toggleInstructions() {

    let variable_name = document.getElementById("checkboxID").checked;

    switch(variable_name) {

        case true:
            document.getElementById("message").innerHTML =
                "Enter the correct username and password.";
        break;

        case false:
            document.getElementById("message").innerHTML = "";
        break;
    }
}

</script>

</body>
</html>
